<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="dashboard-layout">

<!-- Sidebar -->

<div class="sidebar">

<h2>🏨 HostelCare</h2>

<ul>

<li onclick="showSection('complaints')">📋 Complaints</li>
<li onclick="showSection('stats')">📊 Statistics</li>
<li onclick="showSection('staff')">👨‍🔧 Staff</li>
<li onclick="logout()">🚪 Logout</li>

</ul>

</div>


<!-- Main Dashboard -->

<div class="main-dashboard">

<h1>Admin Dashboard</h1>

<div id="complaints" class="dashboard-card">

<h2>Complaint Management</h2>

<table>

<thead>
<tr>
<th>Room</th>
<th>Issue</th>
<th>Priority</th>
<th>Status</th>
</tr>
</thead>

<tbody id="complaintTable">

</tbody>

</table>

</div>


<div id="stats" class="dashboard-card" style="display:none">

<h2>Complaint Statistics</h2>

<canvas id="complaintChart"></canvas>

</div>


<div id="staff" class="dashboard-card" style="display:none">

<h2>Maintenance Staff Allocation</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Skill</th>
<th>Assigned Issue</th>
</tr>
</thead>

<tbody id="staffTable"></tbody>

</tbody>

</table>

</div>


<script src="admin.js"></script>

</body>

</html>
